<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    header img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .master {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .master-label {
      font-size: 14px;
      font-weight: 500;
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #3a3a3a;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider { background: #ff0000; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    .settings-link {
      display: block;
      text-align: center;
      color: #888;
      font-size: 12px;
      text-decoration: none;
      padding: 8px;
      border-radius: 8px;
      transition: color 0.15s;
    }

    .settings-link:hover { color: #f1f1f1; }
  </style>
</head>
<body>
  <header>
    <img src="assets/icon48.png" alt="BareTube">
    <h1>BareTube</h1>
  </header>

  <div class="master">
    <div>
      <div class="master-label">Enable BareTube</div>
      <div class="status" id="status">Active</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="masterToggle">
      <span class="slider"></span>
    </label>
  </div>

  <a href="#" id="settingsLink" class="settings-link">Individual settings</a>

  <script src="popup.js"></script>
</body>
</html>
